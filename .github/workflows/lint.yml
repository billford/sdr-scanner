name: Lint & Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pylint:
    name: Pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pylint -r requirements.txt

      - name: Run pylint
        run: |
          pylint --fail-under=8.0 \
            capture.py classify.py config.py dashboard.py \
            db.py main.py post.py summarize.py transcribe.py

  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: bandit -ll $(git ls-files '*.py')
